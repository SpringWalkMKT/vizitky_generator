name: Generovani vizitek

on:
  workflow_dispatch:
  push:
    paths:
      - "osoby.tsv"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalace zavislosti
        run: pip install -r requirements.txt

      - name: Generovani vizitek
        run: python generuj_vizitku.py --tsv osoby.tsv

      - name: Ulozeni vysledku
        uses: actions/upload-artifact@v4
        with:
          name: vizitky-pdf
          path: output/*.pdf
